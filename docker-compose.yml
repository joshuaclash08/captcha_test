version: "3.8"

services:
  redis:
    image: redis:alpine
    container_name: captcha-redis
    networks:
      - proxy
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: captcha-backend
    restart: always
    networks:
      - proxy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - SITE_REGISTRY_PATH=./data/sites.json
      - ALLOWED_ORIGINS=*
      # IMPORTANT: Replace these dummy AES keys with your real 64-character hex keys in production!
      - AES_KEY_SEED=1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
      - AES_KEY_MASK=fedcba0987654321fedcba0987654321fedcba0987654321fedcba0987654321
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      # Route specific paths to backend
      - "traefik.http.routers.captcha-backend.rule=Host(`captcha.sharingurl.com`) && (PathPrefix(`/api`) || Path(`/captcha.js`) || Path(`/captcha-render.js`) || Path(`/engine.js`) || Path(`/engine.wasm`) || Path(`/debug`))"
      - "traefik.http.services.captcha-backend.loadbalancer.server.port=3000"
      - "traefik.http.routers.captcha-backend.entrypoints=websecure"
      - "traefik.http.routers.captcha-backend.tls=true"
      - "traefik.http.routers.captcha-backend.service=captcha-backend"
      - "traefik.http.routers.captcha-backend.tls.certresolver=cloudflare"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: captcha-frontend
    restart: always
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # Route all other traffic exactly to frontend
      - "traefik.http.routers.captcha-frontend.rule=Host(`captcha.sharingurl.com`)"
      - "traefik.http.services.captcha-frontend.loadbalancer.server.port=5173"
      - "traefik.http.routers.captcha-frontend.entrypoints=websecure"
      - "traefik.http.routers.captcha-frontend.tls=true"
      - "traefik.http.routers.captcha-frontend.tls.certresolver=cloudflare"
networks:
  proxy:
    external: true
